org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation as a temporary workaround for Windows cross-drive build setups.
# This prevents compilation crashes (IllegalArgumentException: this and base files have different roots)
# when the project folder (e.g., on drive O:) resides on a different drive letter than the Pub/Gradle cache (on drive C:).
# Note: This only affects build compilation performance and has zero impact on runtime behavior.
# It can be safely removed if the project is built on the same drive or if upstream Gradle/Kotlin resolves the different roots path translation issue.
kotlin.incremental=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
